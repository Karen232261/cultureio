<!DOCTYPE html>
<html>
<head>
    <title>CultureIO Admin</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .admin-card { border: 1px solid #ccc; padding: 10px; border-radius: 8px; background: white; color: black; }
        .admin-card img { width: 100%; height: 200px; object-fit: cover; }
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        .approve-btn { background: #28a745; color: white; flex: 1; border: none; padding: 5px; cursor: pointer; }
        .delete-btn { background: #dc3545; color: white; flex: 1; border: none; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header class="top-bar">Admin Moderation</header>
    <div id="admin-list" class="admin-grid"></div>

    <script>
        async function loadPending() {
            try {
                // The / at the start is important to make it relative to your domain
                const res = await fetch('/api/admin/pending'); 
                
                if (res.status === 401) {
                    alert("Session expired or unauthorized. Please refresh and log in again.");
                    return;
                }

                const data = await res.json();
                const list = document.getElementById('admin-list');
                
                if (!data || data.length === 0) {
                    list.innerHTML = "<h3>No pending photos! Go grab a coffee. ☕</h3>";
                    return;
                }

                list.innerHTML = data.map(photo => `
                    <div class="admin-card">
                        <img src="${photo.s3Url}">
                        <p><strong>Caption:</strong> ${photo.caption || 'None'}</p>
                        <p><strong>Contact:</strong> ${photo.contact || 'None'}</p>
                        <div class="controls">
                            <button class="approve-btn" onclick="action('${photo._id}', 'approve')">Approve</button>
                            <button class="delete-btn" onclick="action('${photo._id}', 'delete')">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error loading pending photos:", err);
            }
        }

        async function action(id, type) {
            const method = type === 'approve' ? 'PUT' : 'DELETE';
            const url = `/api/admin/${type}/${id}`;
            
            const res = await fetch(url, { method });
            if (res.ok) loadPending();
        }

        loadPending();
    </script>
</body>
</html>
